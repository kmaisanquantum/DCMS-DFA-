version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dcms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dcms_db
      POSTGRES_USER:     dcms_user
      POSTGRES_PASSWORD: dcms_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcms_user -d dcms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: dcms_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://dcms_user:dcms_password@db:5432/dcms_db
      PORT:                3001
      NODE_ENV:            production
      QR_HASH_SECRET:      ${QR_HASH_SECRET:-change-in-production}
      SMTP_HOST:           ${SMTP_HOST:-localhost}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASS:           ${SMTP_PASS:-}
      PUBLIC_BASE_URL:     ${PUBLIC_BASE_URL:-http://localhost:3000}
      FRONTEND_URL:        ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
    container_name: dcms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ── Python QR Scanner ───────────────────────────────────
  scanner:
    build:
      context: ./scanner
      dockerfile: ../docker/Dockerfile.scanner
    container_name: dcms_scanner
    restart: unless-stopped
    environment:
      DCMS_API_BASE: http://backend:3001/api
      PORT:          5001
    ports:
      - "5001:5001"
    depends_on:
      - backend

volumes:
  pgdata:
